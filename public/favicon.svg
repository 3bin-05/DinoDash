<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Pixel-art T-Rex dino (facing right), 16×16 grid, each cell = 1px unit -->
  <!-- Body color: green #4ade80, dark accent: #166534, eye: white, pupil: black -->

  <!-- Head top -->
  <rect x="6" y="0" width="4" height="1" fill="#4ade80"/>
  <!-- Head row 1 -->
  <rect x="5" y="1" width="5" height="1" fill="#4ade80"/>
  <!-- Head row 2 — eye position -->
  <rect x="5" y="2" width="5" height="1" fill="#4ade80"/>
  <rect x="9" y="2" width="1" height="1" fill="#f0fdf4"/><!-- eye white -->
  <!-- Head row 3 — eye pupil + snout starts -->
  <rect x="5" y="3" width="5" height="1" fill="#4ade80"/>
  <rect x="9" y="3" width="1" height="1" fill="#166534"/><!-- pupil -->
  <!-- Snout row 4 -->
  <rect x="8" y="4" width="2" height="1" fill="#4ade80"/>
  <!-- Snout row 5 (open jaw lower) -->
  <rect x="8" y="5" width="3" height="1" fill="#4ade80"/>

  <!-- Neck / upper body -->
  <rect x="5" y="4" width="3" height="1" fill="#4ade80"/>
  <rect x="4" y="5" width="4" height="1" fill="#4ade80"/>

  <!-- Body rows 6-9 -->
  <rect x="3" y="6" width="6" height="1" fill="#4ade80"/>
  <rect x="2" y="7" width="7" height="1" fill="#4ade80"/>
  <rect x="2" y="8" width="7" height="1" fill="#4ade80"/>
  <rect x="3" y="9" width="5" height="1" fill="#4ade80"/>

  <!-- Small arm -->
  <rect x="7" y="7" width="2" height="1" fill="#166534"/>

  <!-- Tail -->
  <rect x="1" y="8" width="2" height="1" fill="#4ade80"/>
  <rect x="0" y="9" width="2" height="1" fill="#4ade80"/>

  <!-- Hip / thigh -->
  <rect x="3" y="10" width="5" height="1" fill="#4ade80"/>
  <rect x="3" y="11" width="4" height="1" fill="#4ade80"/>

  <!-- Legs -->
  <!-- Left leg -->
  <rect x="3" y="12" width="2" height="2" fill="#4ade80"/>
  <rect x="2" y="14" width="3" height="1" fill="#4ade80"/>
  <rect x="2" y="15" width="2" height="1" fill="#166534"/>

  <!-- Right leg -->
  <rect x="5" y="12" width="2" height="2" fill="#4ade80"/>
  <rect x="5" y="14" width="3" height="1" fill="#4ade80"/>
  <rect x="6" y="15" width="2" height="1" fill="#166534"/>
</svg>